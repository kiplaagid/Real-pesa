.btn{width:95%;padding:18px;border:none;border-radius:12px;font-weight:bold;font-size:1.2rem;cursor:pointer;margin-bottom:12px;text-transform:uppercase;}

.tx-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222;font-size:0.8rem;}
.win-c{color:var(--m);}.loss-c{color:var(--r);}
.footer-box{background: #1a1a1a; padding: 15px; border-top: 1px solid #333; margin-top: 20px;}
