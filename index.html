<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-pesa | Wallet</title>
    <style>
        :root { --p: #1b5e20; --a: #2e7d32; --m: #4caf50; --g: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--g); text-align: center; }
        header { background: var(--p); color: white; padding: 25px; }
        .balance-card { background: white; margin: -25px auto 20px; width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .amount { font-size: 2.2rem; font-weight: bold; color: var(--a); margin: 10px 0; }
        .container { max-width: 450px; margin: 0 auto; padding: 0 15px 50px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: left; }
        .box { background: #e8f5e9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--m); margin: 15px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--m); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .copy-btn { background: var(--p); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>Real-pesa</h1></header>
    <div class="balance-card">
        <p style="margin: 0; color: #666;">Current Balance</p>
        <div class="amount">KES 0.00</div>
        <small style="color: var(--m);">● Account Active</small>
    </div>
    <div class="container">
        <div class="card">
            <h3 style="margin-top:0; color:var(--p);">💰 Deposit to Pochi</h3>
            <div class="box">
                <strong>Pay to:</strong><br>
                <span id="p-num" style="font-size: 1.2rem; font-weight: bold;">0797097831</span>
                <button class="copy-btn" onclick="copyNum()">Copy</button>
                <p style="font-size: 0.9rem; margin-top: 10px;">Lipa na M-PESA > Pochi la Biashara</p>
            </div>
            <form action="#" method="POST">
                <input type="text" placeholder="M-PESA Code" required>
                <input type="number" placeholder="Amount (KES)" required>
                <button type="submit" class="btn">Confirm Deposit</button>
            </form>
        </div>
    </div>
    <script>
        function copyNum() {
            const num = document.getElementById('p-num').innerText;
            navigator.clipboard.writeText(num);
            alert("Number copied: " + num);
        }
    </script>
</body>
</html>
