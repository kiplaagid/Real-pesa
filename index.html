<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-pesa Aviator</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        #game-container { margin-top: 50px; }
        #multiplier { font-size: 3rem; color: #ff0055; }
        canvas { background: #000; border: 2px solid #333; width: 90%; max-width: 500px; height: 300px; }
        button { padding: 15px 30px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 8px; border: none; }
        #betBtn { background: #28a745; color: white; }
        #cashOutBtn { background: #ffc107; color: black; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="multiplier">1.00x</h1>
        <canvas id="gameCanvas"></canvas>
        <div>
            <button id="betBtn">BET</button>
            <button id="cashOutBtn" disabled>CASH OUT</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
