<script>
    let balance = 0; let count = 1.00; let running = false; let interval; let currentStake = 0;
    let isAutoMode = true; // This keeps the plane moving even without a bet

    // Start the auto-loop as soon as the page loads
    window.onload = function() {
        startAutoRound();
    };

    function verifyPochi() {
        let code = document.getElementById('txnCode').value.trim();
        if (code.length < 8) { alert("Invalid Code!"); return; }
        balance += 10;
        updateUI();
        alert("Success! KES 10 added.");
        document.getElementById('txnCode').value = "";
    }

    function updateHistory(multiplier, status, amount) {
        let log = document.getElementById('historyLog');
        if (log.innerHTML.includes("No games played")) { log.innerHTML = ""; }
        let statusClass = status === "WIN" ? "win-text" : "loss-text";
        let entry = `<div class="history-item">
            <span>${multiplier}x</span>
            <span class="${statusClass}">${status}</span>
            <span>KES ${amount}</span>
        </div>`;
        log.innerHTML = entry + log.innerHTML;
        if (log.children.length > 5) { log.removeChild(log.lastElementChild); }
    }

    function startAutoRound() {
        if (running) return;
        
        // Reset display for new round
        count = 1.00;
        document.getElementById('display').innerText = "1.00x";
        document.getElementById('display').style.color = "#ff4444";
        document.getElementById('status').innerText = "Waiting for next round...";
        
        // 5 second countdown before flying
        setTimeout(() => {
            running = true;
            document.getElementById('status').innerText = "Plane is airborne!";
            let crashPoint = (Math.random() * 5 + 1.1).toFixed(2);
            
            interval = setInterval(() => {
                count += 0.01;
                document.getElementById('display').innerText = count.toFixed(2) + "x";
                if (count >= crashPoint) { 
                    clearInterval(interval);
                    autoGameOver();
                }
            }, 100);
        }, 5000); 
    }

    function startGame() {
        currentStake = parseFloat(document.getElementById('stake').value);
        if (balance < currentStake) { alert("Insufficient Balance!"); return; }
        
        // If the plane is already flying in auto-mode, the player joins the current round
        if (running) {
            balance -= currentStake;
            updateUI();
            isAutoMode = false; // Now it's a real bet
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('cashBtn').style.display = "block";
        } else {
            alert("Wait for the next round to start!");
        }
    }

    function cashOut() {
        if (running && !isAutoMode) {
            let win = currentStake * count;
            balance += win;
            updateHistory(count.toFixed(2), "WIN", win.toFixed(2));
            updateUI();
            resetButtons();
            isAutoMode = true; // Return to watching mode
            alert("Cashed Out!");
        }
    }

    function autoGameOver() {
        running = false;
        document.getElementById('display').style.color = "#444";
        document.getElementById('status').innerText = "BUST!";
        
        // If the player was in this round and didn't cash out
        if (!isAutoMode) {
            updateHistory(count.toFixed(2), "LOSS", currentStake.toFixed(2));
            resetButtons();
            isAutoMode = true;
        }
            // ... existing code ...
    
        // Start the next round automatically after 3 seconds
        setTimeout(startAutoRound, 3000);
    }

    function updateUI() { document.getElementById('balance').innerText = balance.toFixed(2); }
    function resetButtons() {
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('cashBtn').style.display = "none";
    }
</script>    // ... existing code ...
    </script>
</body>
</html>
