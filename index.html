<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-pesa Aviator</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; margin: 0; }
        .wallet-container { background: #333; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: inline-block; width: 90%; }
        .wallet { font-size: 28px; color: #28a745; font-weight: bold; }
        .multiplier { font-size: 80px; color: #ff4444; font-weight: bold; margin: 30px 0; text-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
        input { padding: 15px; font-size: 18px; width: 85%; border-radius: 8px; border: none; margin-bottom: 10px; background: #fff; color: #000; }
        button { padding: 18px; font-size: 20px; width: 90%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .bet-btn { background: #28a745; color: white; margin-bottom: 10px; }
        .cash-btn { background: #ffc107; color: black; display: none; }
        .deposit-section { background: #222; padding: 20px; border-radius: 15px; border: 2px solid #28a745; margin-top: 30px; }
        .pochi-btn { background: #007bff; color: white; text-decoration: none; padding: 15px; border-radius: 8px; display: block; width: 80%; margin: 15px auto; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Real-pesa Aviator</h1>
    
    <div class="wallet-container">
        <div class="wallet">Wallet: KES <span id="balance">0</span></div>
        <div id="status" style="color: #aaa; margin-top: 5px;">Deposit to fly!</div>
    </div>
    
    <div class="multiplier" id="display">1.00x</div>
    
    <input type="number" id="stake" value="10" min="1" placeholder="Enter Stake">
    <button class="bet-btn" id="startBtn" onclick="startGame()">PLACE BET</button>
    <button class="cash-btn" id="cashBtn" onclick="cashOut()">CASH OUT</button>

    <div class="deposit-section">
        <h3 style="color: #28a745; margin-top: 0;">M-PESA Deposit</h3>
        <p style="font-size: 14px;">1. Send stake to Pochi Number:</p>
        <p style="font-size: 22px; font-weight: bold; color: #fff;">0797097831</p>
        
        <a href="tel:*334*6*1*1*0797087831*10#" class="pochi-btn">CLICK TO PAY KES 10</a>

        <p style="font-size: 14px; margin-top: 20px;">2. Paste M-PESA Code below:</p>
        <input type="text" id="txnCode" placeholder="Paste Code (e.g. RCK...)">
        <button onclick="verifyPochi()" style="background: #444; color: white; padding: 12px; font-size: 16px;">VERIFY DEPOSIT</button>
    </div>

    <script>
        let balance = 0; let count = 1.00; let running = false; let interval; let currentStake = 0;

        function verifyPochi() {
            let code = document.getElementById('txnCode').value.trim();
            if (code.length < 8) { alert("Invalid Transaction Code!"); return; }
            
            // This manually adds the money. In the future, we can automate this!
            balance += 10;
            updateUI();
            alert("Success! KES 10.00 added to your account.");
            document.getElementById('txnCode').value = "";
            document.getElementById('status').innerText = "Ready to Play!";
        }

        function startGame() {
            currentStake = parseFloat(document.getElementById('stake').value);
            if (balance < currentStake) { alert("Insufficient Balance! Please deposit."); return; }
            
            balance -= currentStake;
            updateUI();
            count = 1.00; running = true;
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('cashBtn').style.display = "block";
            document.getElementById('status').innerText = "Plane is airborne...";
            
            let crashPoint = (Math.random() * 5 + 1.1).toFixed(2);
            interval = setInterval(() => {
                count += 0.01;
                document.getElementById('display').innerText = count.toFixed(2) + "x";
                if (count >= crashPoint) { gameOver(); }
            }, 100);
        }

        function cashOut() {
            if (running) {
                clearInterval(interval); running = false;
                let win = currentStake * count;
                balance += win;
                updateUI(); resetButtons();
                alert("WINNER! You cashed out at " + count.toFixed(2) + "x and won KES " + win.toFixed(2));
            }
        }

        function gameOver() {
            clearInterval(interval); running = false;
            document.getElementById('display').style.color = "#444";
            document.getElementById('status').innerText = "BUST! Plane flew away.";
            setTimeout(() => { resetButtons(); }, 2000);
        }

        function updateUI() { document.getElementById('balance').innerText = balance.toFixed(2); }
        function resetButtons() {
            document.getElementById('startBtn').style.display = "block";
            document.getElementById('cashBtn').style.display = "none";
            document.getElementById('display').style.color = "#ff4444";
        }
    </script>
</body>
</html>
