<!DOCTYPE html>
<html>
<head>
    <title>Real-pesa Aviator</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .multiplier { font-size: 50px; color: #ff4444; margin-top: 50px; }
        button { padding: 15px 30px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Real-pesa Aviator</h1>
    <div class="multiplier" id="display">1.00x</div>
    <br>
    <button onclick="startGame()">Start Flight</button>

    <script>
        function startGame() {
            let count = 1.00;
            const display = document.getElementById('display');
            setInterval(() => {
                count += 0.01;
                display.innerText = count.toFixed(2) + "x";
            }, 100);
        }
    </script>
</body>
</html>
