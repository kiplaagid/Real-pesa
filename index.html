<!DOCTYPE html>
<html lang="en">
<head>

        #game-container { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 95%; max-width: 380px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; padding: 12px; background: #222; border-radius: 10px; margin-bottom: 10px; color: #00ff88; font-weight: bold; border: 1px solid #333; }
        #canvas-wrapper { position: relative; background: radial-gradient(circle, #111 0%, #000 100%); border-radius: 10px; height: 180px; margin-bottom: 10px; overflow: hidden; border: 1px solid #444; }
        canvas { width: 100%; height: 100%; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; font-weight: 900; color: white; z-index: 10; pointer-events: none; }
        .history-bar { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; overflow: hidden; height: 25px; }

        .controls { background: #222; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; font-size: 1.2rem; }
        button { padding: 14px; font-size: 1.1rem; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        #betBtn { background: #28a745; color: white; }
        #cashBtn { background: #ffc107; color: black; }
        #resetBtn { background: transparent; color: #555; font-size: 0.7rem; margin-top: 10px; border: 1px solid #333; padding: 5px; width: 100px; align-self: center; }
        button:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; opacity: 0.5; }
        #status { margin-top: 8px; font-size: 0.9rem; color: #aaa; min-height: 1.2rem; font-style: italic; }
    </style>
</head>
