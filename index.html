<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-pesa | Dashboard</title>
    <style>
        :root {
            --primary: #1b5e20;
            --accent: #2e7d32;
            --mpesa: #4caf50;
            --light: #ffffff;
            --gray: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--gray); text-align: center; }
        nav { background: var(--primary); padding: 15px; color: white; font-weight: bold; }
        .hero { background: #333; color: white; padding: 40px 20px; }
        .container { max-width: 500px; margin: -30px auto 40px; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .instruction-box { background: #e8f5e9; padding: 15px; border-radius: 10px; text-align: left; border-left: 5px solid var(--mpesa); margin: 15px 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-confirm { width: 100%; background: var(--mpesa); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; }
        
        .service-card { background: #f1f8e9; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: left; display: flex; align-items: center; }
        .icon { font-size: 1.5rem; margin-right: 15px; }
    </style>
</head>
<body>

    <nav>Real-pesa</nav>
    <div class="hero">
        <h2>Your Dashboard</h2>
    </div>

    <div class="container">
        <div class="card">
            <h3 style="color:var(--primary);">💰 Pochi la Biashara Deposit</h3>
            <div class="instruction-box">
                <strong>Pay to Pochi:</strong>
                <p style="margin: 5px 0;">Phone: <strong>[Your Number]</strong></p>
            </div>
            
            <form action="https://formspree.io/f/YOUR_ID" method="POST">
                <input type="text" name="code" placeholder="M-PESA Code" required>
                <input type="number" name="amount" placeholder="Amount (KES)" required>
                <button type="submit" class="btn-confirm">Confirm Deposit</button>
            </form>
        </div>

        <div class="card">
            <div class="service-card">
                <span class="icon">🛡️</span>
                <div><strong>Secure Transactions</strong><br><small>End-to-end encrypted.</small></div>
            </div>
            <div class="service-card">
                <span class="icon">⚡</span>
                <div><strong>Quick Payments</strong><br><small>Sent in seconds.</small></div>
            </div>
        </div>
    </div>

    <footer style="color:#888; font-size:0.8rem; padding-bottom:20px;">
        &copy; 2026 Real-pesa. Created by Kiplangat Gideon.
    </footer>

</body>
</html>
