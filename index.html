:root{--p:#2e7d32;--m:#66bb6a;--d:#0a0a0a;--r:#ff5252;--g:#1a1a1a;}

.game{background:linear-gradient(180deg, #111 0%, #000 100%);margin:15px;height:200px;border-radius:20px;border:1px solid #333;display:flex;flex-direction:column;justify-content:center;}

.tx-list{margin:15px;background:var(--g);padding:18px;border-radius:20px;border:1px solid #333;text-align:left;}
.tx-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #222;font-size:0.85rem;}
.live-tag{background:var(--r);color:white;padding:2px 6px;border-radius:4px;font-size:0.6rem;font-weight:bold;margin-right:8px;animation:pulse 1.5s infinite;}
.win-c{color:var(--m);font-weight:bold;}
.footer-box{background:#0a0a0a;padding:20px;border-top:1px solid #222;margin-top:20px;}
@keyframes pulse{0%{opacity:1;}50%{opacity:0.6;}100%{opacity:1;}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

    </div>
</div>

<div class="tx-list">

</div>
