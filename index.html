<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Real-pesa | Aviator</title><style>
:root{--p:#1b5e20;--m:#4caf50;--d:#121212;}body{font-family:sans-serif;margin:0;background:#000;color:#fff;text-align:center;}
header{background:var(--p);padding:15px;font-weight:bold;}.hist{background:#1a1a1a;padding:8px;display:flex;justify-content:center;gap:5px;font-size:0.7rem;overflow:hidden;border-bottom:1px solid #333;}
.h-item{background:#333;padding:3px 8px;border-radius:10px;color:var(--m);}.game{background:var(--d);margin:10px;height:160px;border-radius:10px;border:2px solid #333;display:flex;flex-direction:column;justify-content:center;}
#mult{font-size:3.5rem;font-weight:bold;}.ctrl{padding:20px;background:#1a1a1a;margin:10px;border-radius:15px;}
input{width:90%;padding:12px;margin:10px 0;border-radius:8px;border:none;font-size:1.1rem;}.btn{width:95%;padding:15px;border:none;border-radius:10px;font-weight:bold;font-size:1.2rem;cursor:pointer;}
.bet{background:var(--m);color:#fff;}.cash{background:#fbc02d;color:#000;}</style></head>
<body><header>Real-pesa Aviator</header>
<div class="hist" id="hist"><span>History:</span></div>
<div class="game"><div id="mult">1.00x</div><div id="stat" style="color:#888;">Ready</div></div>
<div class="ctrl"><div>Wallet: <span id="bal">KES 0.00</span></div><input type="number" id="amt" placeholder="Amount">
<button id="btn" class="btn bet" onclick="go()">PLACE BET</button></div>
<footer style="font-size:0.8rem;color:#888;">Pochi: <strong>0797097831</strong></footer>
<script>let m=1.0,run=false,iv,h=[];function addH(val){h.unshift(val);if(h.length>5)h.pop();
let html='<span>History:</span>';h.forEach(v=>{html+=`<span class="h-item">${v}x</span>`});document.getElementById('hist').innerHTML=html;}
function go(){let b=document.getElementById('btn'),s=document.getElementById('stat'),x=document.getElementById('mult');
if(!run){run=true;m=1.0;s.innerText="Flying...";s.style.color="#4caf50";b.innerText="CASH OUT";b.className="btn cash";
let crash=Math.random()*5+1.1;iv=setInterval(()=>{m+=0.01;x.innerText=m.toFixed(2)+"x";if(m>=crash){clearInterval(iv);run=false;
addH(m.toFixed(2));x.innerText="FLEW AWAY!";x.style.color="#f44336";b.innerText="PLACE BET";b.className="btn bet";
setTimeout(()=>{x.style.color="#fff";x.innerText="1.00x";s.innerText="Ready";},2000);}},100);}
else{clearInterval(iv);run=false;addH(m.toFixed(2));x.style.color="#4caf50";s.innerText="WON!";b.innerText="PLACE BET";b.className="btn bet";
setTimeout(()=>{x.style.color="#fff";x.innerText="1.00x";s.innerText="Ready";},2000);}}</script></body></html>
