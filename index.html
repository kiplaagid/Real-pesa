<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-pesa Aviator Pro</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto; padding: 20px 0; }
        #game-container { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 95%; max-width: 380px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; padding: 12px; background: #222; border-radius: 10px; margin-bottom: 10px; color: #00ff88; font-weight: bold; border: 1px solid #333; }
        #canvas-wrapper { position: relative; background: radial-gradient(circle, #111 0%, #000 100%); border-radius: 10px; height: 180px; margin-bottom: 10px; overflow: hidden; border: 1px solid #444; }
        canvas { width: 100%; height: 100%; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; font-weight: 900; color: white; z-index: 10; pointer-events: none; }
        .history-bar { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; overflow: hidden; height: 25px; }
        .hist-item { background: #333; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; color: #ff0055; border: 1px solid #444; }
        .controls, .action-section { background: #222; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; font-size: 1.1rem; width: calc(100% - 26px); }
        button { padding: 14px; font-size: 1.1rem; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; transition: 0.2s; width: 100%; }
        #betBtn { background: #28a745; color: white; }
        #cashBtn { background: #ffc107; color: black; }
        #status { margin-top: 8px; font-size: 1rem; color: #ffc107; min-height: 1.2rem; font-weight: bold; }
        #profit-tracker { color: #00ff88; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; display: none; }
        .pochi-box { background: #111; padding: 12px; border-radius: 8px; border: 1px dashed #00ff88; font-size: 0.9rem; color: #00ff88; line-height: 1.4; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <span>REAL-PESA</span>
        <span>Ksh <span id="balance">1000</span></span>
    </div>

    <div class="history-bar" id="historyBar"></div>

    <div id="canvas-wrapper">
        <div id="multiplier">1.00x</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <div id="profit-tracker">Profit: Ksh 0</div>
        <input type="number" id="betAmount" value="100" step="10">
        <button id="betBtn">PLACE BET</button>
        <button id="cashBtn" disabled>CASH OUT</button>
        <div id="status">Loading...</div>
    </div>

    <div class="action-section">
        <strong style="color: #007bff; font-size: 0.9rem;">DEPOSIT</strong>
        <div class="pochi-box">
            Lipa na M-PESA Pochi: <br>
            <strong style="font-size: 1.2rem;">0797097831</strong>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const multDisplay = document.getElementById('multiplier');
    const balDisplay = document.getElementById('balance');
    const betInput = document.getElementById('betAmount');
    const betBtn = document.getElementById('betBtn');
    const cashBtn = document.getElementById('cashBtn');
    const statusText = document.getElementById('status');
    const historyBar = document.getElementById('historyBar');
    const profitDisplay = document.getElementById('profit-tracker');

    let multiplier = 1.00;
    let isFlying = false;
    let betPlaced = false;
    let balance = parseInt(localStorage.getItem('realPesaBalance')) || 1000;
    let history = JSON.parse(localStorage.getItem('realPesaHistory')) || [];
    let currentBet = 0;
    let crashPoint = 0;
    let frame = 0;

    function updateUI() {
        balDisplay.innerText = balance;
        historyBar.innerHTML = '';
        history.slice(-6).reverse().forEach(val => {
            const span = document.createElement('div');
            span.className = 'hist-item';
            span.innerText = val + 'x';
            historyBar.appendChild(span);
        });
    }

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "#ff0055";
        ctx.lineWidth = 4;
        ctx.moveTo(0, canvas.height);
        for (let i = 0; i < frame; i++) {
            let x = (i / 200) * canvas.width;
            let y = canvas.height - Math.pow(i / 50, 2);
            ctx.lineTo(x, y);
        }
        ctx.stroke();
        let lastX = (frame / 200) * canvas.width;
        let lastY = canvas.height - Math.pow(frame / 50, 2);
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("✈️", lastX - 10, lastY + 10);
    }

    function gameLoop() {
        if (!isFlying) return;
        frame++;
        multiplier += 0.005 + (frame / 7000);
        multDisplay.innerText = multiplier.toFixed(2) + "x";
        multDisplay.style.color = "white";
        
        // --- PROFIT CALCULATION ---
        if (betPlaced) {
            let currentProfit = Math.floor(currentBet * multiplier);
            profitDisplay.innerText = `Profit: Ksh ${currentProfit}`;
            profitDisplay.style.display = "block";
        }

        drawGraph();

        if (multiplier >= crashPoint) {
            isFlying = false;
            multDisplay.style.color = "#ff0055";
            statusText.innerText = `FLEW AWAY! @ ${multiplier.toFixed(2)}x`;
            profitDisplay.style.display = "none";
            history.push(multiplier.toFixed(2));
            localStorage.setItem('realPesaHistory', JSON.stringify(history));
            updateUI();
            setTimeout(startWaitingPeriod, 2500);
        } else {
            requestAnimationFrame(gameLoop);
        }
    }

    function startWaitingPeriod() {
        isFlying = false;
        betPlaced = false;
        betBtn.disabled = false;
        betBtn.innerText = "PLACE BET";
        cashBtn.disabled = true;
        profitDisplay.style.display = "none";
        let countdown = 5;
        
        let timer = setInterval(() => {
            statusText.innerText = `Next Round in ${countdown}s`;
            countdown--;
            if (countdown < 0) {
                clearInterval(timer);
                startFlight();
            }
        }, 1000);
    }

    function startFlight() {
        isFlying = true;
        frame = 0;
        multiplier = 1.00;
        crashPoint = (Math.random() * 4 + 1.1).toFixed(2);
        statusText.innerText = betPlaced ? "In Flight! Ready to cash out?" : "Watching Flight...";
        if (betPlaced) cashBtn.disabled = false;
        gameLoop();
    }

    betBtn.addEventListener('click', () => {
        let amt = parseInt(betInput.value);
        if (amt > balance || amt <= 0) return alert("Check Balance!");
        balance -= amt;
        currentBet = amt;
        betPlaced = true;
        betBtn.disabled = true;
        betBtn.innerText = "BET PLACED";
        localStorage.setItem('realPesaBalance', balance);
        updateUI();
    });

    cashBtn.addEventListener('click', () => {
        if (isFlying && betPlaced) {
            let win = Math.floor(currentBet * multiplier);
            balance += win;
            betPlaced = false;
            cashBtn.disabled = true;
            statusText.innerText = `WON: Ksh ${win}!`;
            localStorage.setItem('realPesaBalance', balance);
            updateUI();
        }
    });

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    updateUI();
    startWaitingPeriod();
</script>
</body>
</html>
