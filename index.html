<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-pesa Aviator</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; margin: 0; }
        .wallet-container { background: #333; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: inline-block; width: 90%; }
        .wallet { font-size: 28px; color: #28a745; font-weight: bold; }
        .multiplier { font-size: 80px; color: #ff4444; font-weight: bold; margin: 30px 0; text-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
        input { padding: 15px; font-size: 18px; width: 85%; border-radius: 8px; border: none; margin-bottom: 10px; background: #fff; color: #000; }
        button { padding: 18px; font-size: 20px; width: 90%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 5px; }
        .bet-btn { background: #28a745; color: white; }
        .cash-btn { background: #ffc107; color: black; display: none; }
        .withdraw-btn { background: #dc3545; color: white; }
        .deposit-section { background: #222; padding: 20px; border-radius: 15px; border: 2px solid #28a745; margin-top: 30px; }
        .pochi-btn { background: #007bff; color: white; text-decoration: none; padding: 15px; border-radius: 8px; display: block; width: 80%; margin: 15px auto; font-size: 18px; }
        .history-section { background: #222; padding: 15px; border-radius: 12px; margin-top: 25px; border: 1px solid #444; text-align: left; }
        .history-title { font-size: 18px; color: #aaa; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; text-align: center; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .win-text { color: #28a745; font-weight: bold; }
        .loss-text { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Real-pesa Aviator</h1>
    <div class="wallet-container">
        <div class="wallet">Wallet: KES <span id="balance">0</span></div>
        <div id="status" style="color: #aaa; margin-top: 5px;">Waiting for next round...</div>
    </div>
